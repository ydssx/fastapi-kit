services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_kit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_kit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    environment:
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-creator-media}
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      [
        "mc alias set local http://minio:9000 \"$${OBJECT_STORAGE_ACCESS_KEY}\" \"$${OBJECT_STORAGE_SECRET_KEY}\" && mc mb --ignore-existing \"local/$${OBJECT_STORAGE_BUCKET}\"",
      ]

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/entrypoint.sh"]
    command: ["alembic", "upgrade", "head"]

  api:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/app.log
      TRUST_PROXY_HEADERS: "true"
      ADMIN_REPORTED_API_REPLICAS: ${SCALE_API:-1}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - api_logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 35s
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.caddy
    ports:
      - "443:443"
      - "8000:8000"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/certs:/etc/caddy/certs:ro
    depends_on:
      api:
        condition: service_healthy

  admin-dev:
    profiles: ["admin-dev"]
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: https://proxy
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0"]
    depends_on:
      proxy:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--no-check-certificate",
          "--spider",
          "https://127.0.0.1/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  celery-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/celery.log
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - api_logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info"]

  celery-beat:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/celery-beat.log
    volumes:
      - api_logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]

  loki:
    profiles: ["ops"]
    image: grafana/loki:3.4.2
    expose:
      - "3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    profiles: ["ops"]
    image: grafana/promtail:3.4.2
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - api_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  flower:
    profiles: ["ops"]
    build: .
    expose:
      - "5555"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command:
      [
        "celery",
        "-A",
        "app.tasks.celery_app",
        "flower",
        "--port=5555",
        "--url_prefix=flower",
      ]

volumes:
  postgres_data:
  api_logs:
  minio_data:
  loki_data:
  admin_node_modules:
