services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_kit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_kit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/entrypoint.sh"]
    command: ["alembic", "upgrade", "head"]

  api:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/app.log
      TRUST_PROXY_HEADERS: "true"
    volumes:
      - api_logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 35s
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "8000:8000"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/certs:/etc/caddy/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--no-check-certificate",
          "--spider",
          "https://127.0.0.1/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  celery-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/celery.log
    volumes:
      - api_logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info"]

  celery-beat:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/celery-beat.log
    volumes:
      - api_logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]

volumes:
  postgres_data:
  api_logs:
