services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_kit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_kit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/app.log
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  celery-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/celery.log
    volumes:
      - api_logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info"]

  celery-beat:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_kit
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: logs/celery-beat.log
    volumes:
      - api_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]

volumes:
  postgres_data:
  api_logs:
