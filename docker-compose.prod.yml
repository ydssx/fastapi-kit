x-app-environment: &prod-app-environment
  ENVIRONMENT: prod
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.prod}
  REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.prod}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
  CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env.prod}
  APP_PUBLIC_URL: ${APP_PUBLIC_URL:?Set APP_PUBLIC_URL in .env.prod}
  TRUST_PROXY_HEADERS: "true"
  OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?Set OBJECT_STORAGE_ENDPOINT in .env.prod}
  OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:?Set OBJECT_STORAGE_PUBLIC_ENDPOINT in .env.prod}
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?Set OBJECT_STORAGE_BUCKET in .env.prod}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?Set OBJECT_STORAGE_ACCESS_KEY in .env.prod}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?Set OBJECT_STORAGE_SECRET_KEY in .env.prod}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
  IMAGE_GENERATION_API_KEY: ${IMAGE_GENERATION_API_KEY:-}
  IMAGE_GENERATION_BASE_URL: ${IMAGE_GENERATION_BASE_URL:-https://api.openai.com/v1}
  IMAGE_GENERATION_MODEL: ${IMAGE_GENERATION_MODEL:-gpt-image-2}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
  ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
  ALERT_WEBHOOK_SECRET: ${ALERT_WEBHOOK_SECRET:-}
  LOKI_URL: ${LOKI_URL:-}

services:
  postgres:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.prod}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]

  redis:
    ports: !reset []
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod}",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping",
        ]

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:?Set OBJECT_STORAGE_ACCESS_KEY in .env.prod}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:?Set OBJECT_STORAGE_SECRET_KEY in .env.prod}

  minio-init:
    environment:
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?Set OBJECT_STORAGE_ACCESS_KEY in .env.prod}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?Set OBJECT_STORAGE_SECRET_KEY in .env.prod}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?Set OBJECT_STORAGE_BUCKET in .env.prod}

  migrate:
    env_file: !reset []
    environment: *prod-app-environment

  api:
    env_file: !reset []
    environment:
      <<: *prod-app-environment
      LOG_FILE: logs/app.log
      ADMIN_REPORTED_API_REPLICAS: ${SCALE_API:-1}

  proxy:
    ports: !override
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env.prod}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env.prod}
    volumes: !override
      - ./docker/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  celery-worker:
    env_file: !reset []
    environment:
      <<: *prod-app-environment
      LOG_FILE: logs/celery.log

  celery-beat:
    env_file: !reset []
    environment:
      <<: *prod-app-environment
      LOG_FILE: logs/celery-beat.log

  flower:
    env_file: !reset []
    environment: *prod-app-environment

volumes:
  redis_data:
  caddy_data:
  caddy_config:
